<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- แก้ไขข้อความพรีวิวสำหรับ LINE ตรงนี้ครับ -->
    <title>Happy Birthday Yingpa!</title>
    <meta property="og:type" content="website">
    <meta property="og:title" content="HBD หญิงป้า 🎂✨">
    <meta property="og:description" content="ของขวัญจากน้องเพง อิอิ">
    
    <!-- แนะนำ: ถ้าเป็นไปได้ให้ใส่ URL เต็มของรูป เช่น https://hbd-yingpa.vercel.app/img/photo1.jpg -->
    <meta property="og:image" content="./img/photo2.jpg"> 

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Sarabun:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="clouds">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <div class="card">

        <div class="scene">
            <div class="sparkles">
                <span class="sp">✨</span>
                <span class="sp">🌸</span>
                <span class="sp">⭐</span>
                <span class="sp">💫</span>
                <span class="sp">🎀</span>
                <span class="sp">✨</span>
            </div>

            <!-- PHOTO STRIP -->
            <div class="strip-wrapper">
                <div class="strip">

                    <div class="photo-frame">
                        <img src="./img/photo1.jpg" alt="photo 1"
                            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                        <div class="photo-placeholder" style="display:none">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white"
                                stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="3" />
                                <circle cx="12" cy="10" r="3.5" />
                                <path d="M6 21c0-3 2.5-5 6-5s6 2 6 5" />
                            </svg>
                            <span>photo 1</span>
                        </div>
                    </div>

                    <div class="photo-frame">
                        <img src="./img/photo2.jpg" alt="photo 2"
                            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                        <div class="photo-placeholder" style="display:none">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white"
                                stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="3" />
                                <circle cx="12" cy="10" r="3.5" />
                                <path d="M6 21c0-3 2.5-5 6-5s6 2 6 5" />
                            </svg>
                            <span>photo 2</span>
                        </div>
                    </div>

                    <div class="photo-frame">
                        <img src="./img/photo3.jpg" alt="photo 3"
                            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                        <div class="photo-placeholder" style="display:none">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white"
                                stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="3" />
                                <circle cx="12" cy="10" r="3.5" />
                                <path d="M6 21c0-3 2.5-5 6-5s6 2 6 5" />
                            </svg>
                            <span>photo 3</span>
                        </div>
                    </div>

                    <div class="strip-label">✦ 01/04/2026 ✦</div>
                </div>
            </div>

            <!-- CAMERA -->
            <div class="camera">
                <div class="cam-body">
                    <div class="cam-slot"></div>
                    <div class="cam-finder"></div>
                    <div class="cam-flash"></div>
                    <div class="cam-lens-outer">
                        <div class="cam-lens-mid">
                            <div class="cam-lens-inner"></div>
                        </div>
                    </div>
                    <div class="cam-hearts">♡ ♡ ♡</div>
                    <div class="cam-label">Love You ✦ Always</div>
                </div>
            </div>
        </div>

        <!-- HBD TITLE — below camera -->
        <div class="hbd-title">
            <h1>🕯️ สุขสันต์วันเกิดหญิงป้า 🎂</h1>
        </div>

        <!-- MESSAGE -->
        <div class="bottom-message" style=" bottom: auto !important; margin-bottom: 15px !important;">
            <div class="hearts-row">💜 💙 🩵</div>
            <p>ขอให้ป้าสุขภาพแข็งแรง<br>
                สวยขึ้นทุกปี รวยๆ เริ่ดๆ<br>
                อยู่กับหนูและแม่ไปนานๆ จุ้บๆ </p>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
        resize(); window.addEventListener('resize', resize);

        const COLORS = ['#EEE2DF', '#DEC1DB', '#5B61B2', '#2F80E4', '#6DA0E1', '#fff', '#f0d0f8', '#ffe0f7'];
        const pieces = [];

        class Piece {
            constructor(delay) { this.delay = delay; this.reset(true); }
            reset(init) {
                this.x = Math.random() * canvas.width;
                this.y = init ? Math.random() * -canvas.height : -16;
                this.w = Math.random() * 9 + 4; this.h = Math.random() * 5 + 2;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - .5) * .14;
                this.vx = (Math.random() - .5) * 1.4;
                this.vy = Math.random() * 1.8 + .8;
                this.shape = Math.random() > .5 ? 'rect' : 'circle';
                this.active = init;
                this.startTime = performance.now() + this.delay;
            }
            update(now) {
                if (!this.active && now >= this.startTime) this.active = true;
                if (!this.active) return;
                this.x += this.vx; this.y += this.vy; this.angle += this.spin;
                if (this.y > canvas.height + 16) this.reset(false);
            }
            draw() {
                if (!this.active) return;
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                if (this.shape === 'rect') ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
                else { ctx.beginPath(); ctx.arc(0, 0, this.w / 2, 0, Math.PI * 2); ctx.fill(); }
                ctx.restore();
            }
        }

        for (let i = 0; i < 100; i++)pieces.push(new Piece(i * 28));
        for (let i = 0; i < 50; i++) { const p = new Piece(0); p.y = Math.random() * canvas.height; p.active = true; pieces.push(p); }

        (function loop(now) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => { p.update(now); p.draw(); });
            requestAnimationFrame(loop);
        })();
    </script>
</body>

</html>
